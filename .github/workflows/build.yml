name: Build Windows Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        architecture: [x64]
        include:
          - architecture: x64
            python_arch: x64
            output_name: BluetoothSecurity_x64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        architecture: ${{ matrix.python_arch }}
        cache: 'pip'

    - name: Install dependencies
      shell: cmd
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build ${{ matrix.architecture }} executable
      shell: cmd
      run: |
        pyinstaller --onefile --name "${{ matrix.output_name }}" --noconfirm --clean bluetooth_security_app.py

    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output_name }}-exe
        path: dist\${{ matrix.output_name }}.exe
        retention-days: 90
