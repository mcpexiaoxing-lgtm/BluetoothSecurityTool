name: Build Windows Executables

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    strategy:
      matrix:
        architecture: [x86, x64]
        include:
          - architecture: x86
            python_arch: x86
            output_name: BluetoothSecurity_x86
          - architecture: x64
            python_arch: x64
            output_name: BluetoothSecurity_x64

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        architecture: ${{ matrix.python_arch }}

    - name: Cache pip packages
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-py${{ matrix.python_arch }}-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-py${{ matrix.python_arch }}-

    - name: Install dependencies
      shell: cmd
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build ${{ matrix.architecture }} executable
      shell: cmd
      run: |
        pyinstaller --onefile --name "${{ matrix.output_name }}" --clean bluetooth_security_app.py

    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.output_name }}-exe
        path: dist\${{ matrix.output_name }}.exe
        retention-days: 30

  build-universal:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      shell: cmd
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build universal executable
      shell: cmd
      run: |
        pyinstaller --onefile --name "BluetoothSecurity_Universal" --clean bluetooth_security_app.py

    - name: Upload executable
      uses: actions/upload-artifact@v4
      with:
        name: BluetoothSecurity_Universal-exe
        path: dist\BluetoothSecurity_Universal.exe
        retention-days: 30
